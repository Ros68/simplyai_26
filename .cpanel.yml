    - cd /home/rvtsmdqo/public_html/git.simplyai.it/simplyai-BE && $NODEPATH/npm install --production

    # ── Riavvia Node.js ────────────────────────────────────────────────
    - cd /home/rvtsmdqo/public_html/git.simplyai.it/simplyai-BE && $NODEPATH/node index.js &
